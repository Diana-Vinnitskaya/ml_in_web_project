worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr warn;
    sendfile on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=5r/s;
    limit_req_status 429;

    upstream streamlit_ui {
        server ui:8501;
    }

    upstream fastapi_backend {
        server backend:8000;
    }

    upstream grafana_backend {
        server grafana:3000;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 4m;

        # Единая точка входа
        error_page 429 = @api_rate_limited;

        location @api_rate_limited {
            default_type application/json;
            return 429 '{"detail":"Too many requests"}';
        }

        # Маршрутизация
        location /api/ {
            limit_req zone=api_rate_limit burst=10 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_read_timeout 300s;
        }

        location = /grafana {
            return 301 /grafana/;
        }

        location /grafana/ {
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            proxy_pass http://streamlit_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
